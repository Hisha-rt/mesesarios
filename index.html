<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz mesesario</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #1a1d1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Press Start 2P', cursive;
            box-sizing: border-box;
            color: #a8bba8;
        }

        h1 {
            color: #2ecc71;
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.8;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
            min-height: 60px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;
            max-width: 350px;
            width: 100%;
        }

        .nivel {
            aspect-ratio: 1 / 1;
            background-color: #2d3436;
            border: 3px solid #4b534b;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* Estilo para niveles desbloqueados */
        .nivel.desbloqueado {
            background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 100%);
            border-color: #52b788;
            animation: pulse 2s infinite ease-in-out;
        }

        .nivel.terminado {
            background: #1b4332;
            border-color: #2ecc71;
            animation: none;
            opacity: 0.9;
        }

        .nivel.terminado::after {
            content: '✅';
            position: absolute; bottom: -5px; right: -5px; font-size: 1rem;
        }

        .nivel.bloqueado::after {
            content: '🔒';
            font-size: 1rem;
            filter: grayscale(1);
        }

        .numero { color: #d8f3dc; font-size: 1.2rem; }

        /* MODALES (Ventanas emergentes) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #2d3436;
            border: 4px solid #2ecc71;
            padding: 25px;
            text-align: center;
            border-radius: 10px;
            max-width: 300px;
            box-shadow: 0 0 20px #2ecc71;
        }

        .modal-content h2 { font-size: 0.8rem; color: #2ecc71; margin-bottom: 20px; }
        .modal-content p { font-size: 0.6rem; line-height: 1.8; color: #fff; margin-bottom: 20px; }

        .btn-cerrar {
            background: #2ecc71;
            color: #1a1d1a;
            border: none;
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            cursor: pointer;
            width: 100%;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1 id="titulo-mision">MISIÓN: AGUANTAR A HAM...</h1>
    
    <div class="grid-container">
        <!-- Nivel 1 -->
        <a href="cuaderno.html" id="nivel-1" class="nivel desbloqueado">
            <span class="numero">1</span>
        </a>
        <!-- Nivel 2 -->
        <a href="cuaderno2.html" id="nivel-2" class="nivel bloqueado">
            <span class="numero">2</span>
        </a>
        
        <!-- Resto de niveles bloqueados -->
        <div class="nivel bloqueado" onclick="mostrarBloqueo()"></div>
        <div class="nivel bloqueado" onclick="mostrarBloqueo()"></div>
        <div class="nivel bloqueado" onclick="mostrarBloqueo()"></div>
        <div class="nivel bloqueado" onclick="mostrarBloqueo()"></div>
        <div class="nivel bloqueado" onclick="mostrarBloqueo()"></div>
        <div class="nivel bloqueado" onclick="mostrarBloqueo()"></div>
        <div class="nivel bloqueado" onclick="mostrarBloqueo()"></div>
        <div class="nivel bloqueado" onclick="mostrarBloqueo()"></div>
        <div class="nivel bloqueado" onclick="mostrarBloqueo()"></div>
        <div class="nivel bloqueado" onclick="mostrarBloqueo()"></div>
    </div>

    <!-- Modal de Nuevo Desbloqueo -->
    <div id="modalDesbloqueo" class="modal">
        <div class="modal-content">
            <h2>¡LEVEL UP!</h2>
            <p>NUEVO NIVEL DESBLOQUEADO.<br><br>FELIZ SEGUNDO MES, MI AMOR.</p>
            <button class="btn-cerrar" onclick="cerrarNuevoDesbloqueo()">¡A JUGAR!</button>
        </div>
    </div>

    <!-- Modal de Bloqueo Normal -->
    <div id="modalBloqueo" class="modal">
        <div class="modal-content">
            <p>NIVEL BLOQUEADO</p>
            <p>PRÓXIMO DESBLOQUEO EN:</p>
            <span id="countdown" style="color:#2ecc71; font-size:0.7rem;"></span>
            <button class="btn-cerrar" onclick="cerrarBloqueo()">VOLVER</button>
        </div>
    </div>

    <script>
        const hoy = new Date();
        const diaActual = hoy.getDate();
        const mesActual = hoy.getMonth(); // Marzo es 2 (Enero=0)

        window.onload = function() {
            // 1. Verificar Nivel 1 (lo que ya tenías)
            if (localStorage.getItem('nivel1Completado') === 'true') {
                document.getElementById('nivel-1').classList.add('terminado');
            }

            // 2. Lógica de Desbloqueo Nivel 2 (20 de Marzo o después)
            if (mesActual >= 2 && diaActual >= 20) {
                const n2 = document.getElementById('nivel-2');
                n2.classList.remove('bloqueado');
                n2.classList.add('desbloqueado');
                
                // Si es la primera vez que lo ve desbloqueado, saltar modal
                if (!localStorage.getItem('vistoDesbloqueoNivel2')) {
                    document.getElementById('modalDesbloqueo').style.display = 'flex';
                }
            }

            // 3. Verificar si el Nivel 2 ya se terminó (para cuando regrese de cuaderno2.html)
            if (localStorage.getItem('nivel2Completado') === 'true') {
                document.getElementById('titulo-mision').innerHTML = "NIVEL 2<br>COMPLETADO";
                document.getElementById('nivel-2').classList.add('terminado');
            }
        };

        function cerrarNuevoDesbloqueo() {
            localStorage.setItem('vistoDesbloqueoNivel2', 'true');
            document.getElementById('modalDesbloqueo').style.display = 'none';
        }

        function mostrarBloqueo() {
            document.getElementById('modalBloqueo').style.display = 'flex';
            actualizarCountdown();
        }

        function cerrarBloqueo() {
            document.getElementById('modalBloqueo').style.display = 'none';
        }

        function actualizarCountdown() {
            let año = hoy.getFullYear();
            let mes = hoy.getMonth();
            if (diaActual >= 20) mes++;
            const proximo20 = new Date(año, mes, 20, 0, 0, 0);
            
            const timer = setInterval(() => {
                const now = new Date().getTime();
                const dist = proximo20 - now;
                const d = Math.floor(dist / (1000*60*60*24));
                const h = Math.floor((dist % (1000*60*60*24)) / (1000*60*60));
                const m = Math.floor((dist % (1000*60*60)) / (1000*60));
                const s = Math.floor((dist % (1000*60)) / 1000);
                document.getElementById("countdown").innerHTML = d + "D " + h + "H " + m + "M " + s + "S";
                if (dist < 0) { clearInterval(timer); document.getElementById("countdown").innerHTML = "¡DISPONIBLE!"; }
            }, 1000);
        }
    </script>
</body>
</html>
